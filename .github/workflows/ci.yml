name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install tools
        uses: jdx/mise-action@v4

      - name: Run go fmt
        run: |
          gofmt_files=$(gofmt -l .)
          if [ -n "$gofmt_files" ]; then
            echo "The following files are not formatted:"
            echo "$gofmt_files"
            exit 1
          fi

      - name: Run go vet
        run: go vet ./...

      - name: Run golangci-lint
        run: golangci-lint run --timeout=5m

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install tools
        uses: jdx/mise-action@v4

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: make build

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install tools
        uses: jdx/mise-action@v4

      - name: Test
        run: make test

  build-cross-platform:
    name: Build Cross-Platform
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
        exclude:
          - goos: windows
            goarch: arm64
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install tools
        uses: jdx/mise-action@v4

      - name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          output_name=firectl-${{ matrix.goos }}-${{ matrix.goarch }}
          if [ "${{ matrix.goos }}" = "windows" ]; then
            output_name="${output_name}.exe"
          fi
          go build -ldflags="-s -w" -o bin/${output_name} .

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: firectl-${{ matrix.goos }}-${{ matrix.goarch }}
          path: bin/
