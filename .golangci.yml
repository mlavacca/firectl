version: "2"

linters:
  default: none
  enable:
    - bodyclose
    - dupl
    - errcheck
    - goconst
    - gocritic
    - gosec
    - govet
    - ineffassign
    - misspell
    - staticcheck
    - unconvert
    - unused
  settings:
    dupl:
      threshold: 100
    goconst:
      min-len: 2
      min-occurrences: 2
    gocritic:
      enabled-tags:
        - diagnostic
        - experimental
        - opinionated
        - performance
        - style
    govet:
      enable:
        - shadow
    misspell:
      locale: US
    nolintlint:
      allow-unused: false
      require-explanation: false
      require-specific: false
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - dupl
          - gosec

formatters:
  enable:
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/mlavacca/firectl

run:
  timeout: 5m
